services:
  backend:
  build: . # This is the path to the Dockerfile
  ports:
    - "3000:3000"

# We dont have to build an image for the database, we can use an existing one from Docker Hub
  db:  
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432" 
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
