<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="Lifecycle diagram: killing one bot container leaves the server and other bots running.">
  <defs>
    <pattern id="dots2" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1C1B19" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="#F4EEE2"/>
  <rect width="1200" height="320" fill="url(#dots2)"/>

  <rect x="24" y="24" width="1152" height="272" fill="none" stroke="#1C1B19" stroke-width="1"/>
  <rect x="32" y="32" width="1136" height="256" fill="none" stroke="#1C1B19" stroke-width="0.5" stroke-opacity="0.4"/>

  <text x="60" y="72" font-family="Courier New, monospace" font-size="11" letter-spacing="2" fill="#8A8275">FAILURE · MODE</text>
  <text x="60" y="108" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#1C1B19">Stop one container. Everything else keeps playing.</text>
  <line x1="60" y1="126" x2="1140" y2="126" stroke="#1C1B19" stroke-opacity="0.15" stroke-width="1"/>

  <!-- BEFORE side -->
  <text x="90" y="158" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">BEFORE · docker ps</text>

  <g font-family="Courier New, monospace" font-size="13">
    <!-- server -->
    <rect x="90" y="172" width="180" height="40" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="90" y="172" width="5" height="40" fill="#539091" rx="2"/>
    <text x="108" y="197" fill="#1C1B19">game-server · up</text>

    <!-- bots -->
    <rect x="90" y="220" width="115" height="34" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="90" y="220" width="5" height="34" fill="#539091" rx="2"/>
    <text x="108" y="242" fill="#1C1B19">viper · up</text>

    <rect x="215" y="220" width="115" height="34" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="215" y="220" width="5" height="34" fill="#539091" rx="2"/>
    <text x="233" y="242" fill="#1C1B19">cobra · up</text>

    <rect x="90" y="260" width="115" height="34" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="90" y="260" width="5" height="34" fill="#539091" rx="2"/>
    <text x="108" y="282" fill="#1C1B19">mamba · up</text>

    <rect x="215" y="260" width="115" height="34" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="215" y="260" width="5" height="34" fill="#539091" rx="2"/>
    <text x="233" y="282" fill="#1C1B19">krait · up</text>
  </g>

  <!-- ACTION arrow -->
  <g>
    <line x1="410" y1="230" x2="540" y2="230" stroke="#1C1B19" stroke-width="1.5" marker-end="url(#arrow2)"/>
    <text x="410" y="212" font-family="Courier New, monospace" font-size="11" letter-spacing="1" fill="#1C1B19">$ docker stop mamba</text>
  </g>
  <defs>
    <marker id="arrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1C1B19"/>
    </marker>
  </defs>

  <!-- AFTER side -->
  <text x="600" y="158" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">AFTER · server still ticking</text>

  <g font-family="Courier New, monospace" font-size="13">
    <rect x="600" y="172" width="180" height="40" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="600" y="172" width="5" height="40" fill="#539091" rx="2"/>
    <text x="618" y="197" fill="#1C1B19">game-server · up</text>

    <rect x="600" y="220" width="115" height="34" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="600" y="220" width="5" height="34" fill="#539091" rx="2"/>
    <text x="618" y="242" fill="#1C1B19">viper · up</text>

    <rect x="725" y="220" width="115" height="34" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="725" y="220" width="5" height="34" fill="#539091" rx="2"/>
    <text x="743" y="242" fill="#1C1B19">cobra · up</text>

    <!-- dead one -->
    <rect x="600" y="260" width="115" height="34" fill="#FFFFFF" stroke="#B25C3F" stroke-dasharray="4 3" rx="6"/>
    <rect x="600" y="260" width="5" height="34" fill="#B25C3F" rx="2"/>
    <text x="618" y="282" fill="#B25C3F">mamba · exit</text>

    <rect x="725" y="260" width="115" height="34" fill="#FFFFFF" stroke="#E0D8CA" rx="6"/>
    <rect x="725" y="260" width="5" height="34" fill="#539091" rx="2"/>
    <text x="743" y="282" fill="#1C1B19">krait · up</text>
  </g>

  <!-- Right-side annotation -->
  <g>
    <line x1="880" y1="200" x2="880" y2="290" stroke="#1C1B19" stroke-opacity="0.15"/>
    <text x="900" y="200" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">WHAT THE SERVER DOES</text>
    <text x="900" y="222" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#1C1B19">Removes the snake.</text>
    <text x="900" y="244" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#1C1B19">Keeps the loop.</text>
    <text x="900" y="266" font-family="Georgia, serif" font-style="italic" font-size="14" fill="#1C1B19">Doesn't blink.</text>
    <text x="900" y="292" font-family="Courier New, monospace" font-size="10" fill="#8A8275">that's the whole point</text>
  </g>
</svg>
