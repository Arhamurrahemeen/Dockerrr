<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="Dockerrr — a Docker learning trail: notes, basics, and builds that actually need containers.">
  <defs>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1C1B19" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="#F4EEE2"/>
  <rect width="1200" height="300" fill="url(#dots)"/>

  <!-- editorial double frame -->
  <rect x="24" y="24" width="1152" height="252" fill="none" stroke="#1C1B19" stroke-width="1"/>
  <rect x="32" y="32" width="1136" height="236" fill="none" stroke="#1C1B19" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- top rail -->
  <text x="60" y="70" font-family="Courier New, monospace" font-size="11" letter-spacing="3" fill="#8A8275">A REPO BY ARHAM · KARACHI · 2026</text>
  <line x1="60" y1="84" x2="1140" y2="84" stroke="#1C1B19" stroke-opacity="0.15"/>

  <!-- title block -->
  <text x="60" y="164" font-family="Georgia, serif" font-style="italic" font-size="88" fill="#1C1B19">Dockerrr</text>
  <text x="60" y="200" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#3A372F">A Docker learning trail — notes, basics, and</text>
  <text x="60" y="228" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#3A372F">builds that actually need containers.</text>

  <!-- teal accent bar (signature) -->
  <rect x="60" y="100" width="5" height="60" fill="#539091" rx="2"/>

  <!-- bottom rail -->
  <line x1="60" y1="252" x2="1140" y2="252" stroke="#1C1B19" stroke-opacity="0.15"/>
  <text x="60" y="270" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">LEARNING · IN · PUBLIC</text>
  <text x="1140" y="270" text-anchor="end" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">github.com/Arhamurrahemeen/Dockerrr</text>
</svg>
