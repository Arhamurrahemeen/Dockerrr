<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" role="img" aria-label="Builds grid: multiplayer snake in a box is live; more builds coming.">
  <defs>
    <pattern id="dots3" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1C1B19" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="380" fill="#F4EEE2"/>
  <rect width="1200" height="380" fill="url(#dots3)"/>

  <rect x="24" y="24" width="1152" height="332" fill="none" stroke="#1C1B19" stroke-width="1"/>
  <rect x="32" y="32" width="1136" height="316" fill="none" stroke="#1C1B19" stroke-width="0.5" stroke-opacity="0.4"/>

  <text x="60" y="72" font-family="Courier New, monospace" font-size="11" letter-spacing="2" fill="#8A8275">THE · BUILDS</text>
  <text x="60" y="110" font-family="Georgia, serif" font-style="italic" font-size="26" fill="#1C1B19">Each one earns its containers, or it doesn't ship.</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#1C1B19" stroke-opacity="0.15"/>

  <!-- BUILD 01: multiplayer snake (LIVE) -->
  <g>
    <rect x="80" y="160" width="360" height="180" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
    <rect x="80" y="160" width="5" height="180" fill="#539091" rx="2"/>

    <text x="104" y="186" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">BUILD 01 · LIVE</text>
    <text x="104" y="218" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#1C1B19">Multiplayer Snake in a Box</text>
    <line x1="104" y1="234" x2="416" y2="234" stroke="#1C1B19" stroke-opacity="0.1"/>
    <text x="104" y="258" font-family="Courier New, monospace" font-size="12" fill="#3A372F">6 containers, 1 server,</text>
    <text x="104" y="276" font-family="Courier New, monospace" font-size="12" fill="#3A372F">4 bots, live spectator view</text>
    <text x="104" y="308" font-family="Courier New, monospace" font-size="10" letter-spacing="1" fill="#539091">multiplayer-snake-lan/</text>
  </g>

  <!-- BUILD 02: placeholder -->
  <g>
    <rect x="460" y="160" width="340" height="180" fill="none" stroke="#8A8275" stroke-width="1" stroke-dasharray="4 4" rx="6"/>
    <text x="484" y="186" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">BUILD 02 · SOON</text>
    <text x="484" y="218" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#8A8275">tbd</text>
    <line x1="484" y1="234" x2="776" y2="234" stroke="#1C1B19" stroke-opacity="0.08"/>
    <text x="484" y="258" font-family="Courier New, monospace" font-size="12" fill="#8A8275">something that would</text>
    <text x="484" y="276" font-family="Courier New, monospace" font-size="12" fill="#8A8275">actually need containers</text>
    <text x="484" y="308" font-family="Courier New, monospace" font-size="10" letter-spacing="1" fill="#8A8275">coming</text>
  </g>

  <!-- BUILD 03: placeholder -->
  <g>
    <rect x="820" y="160" width="300" height="180" fill="none" stroke="#8A8275" stroke-width="1" stroke-dasharray="4 4" rx="6"/>
    <text x="844" y="186" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">BUILD 03 · SOON</text>
    <text x="844" y="218" font-family="Georgia, serif" font-style="italic" font-size="22" fill="#8A8275">tbd</text>
    <line x1="844" y1="234" x2="1096" y2="234" stroke="#1C1B19" stroke-opacity="0.08"/>
    <text x="844" y="258" font-family="Courier New, monospace" font-size="12" fill="#8A8275">same rule applies</text>
    <text x="844" y="308" font-family="Courier New, monospace" font-size="10" letter-spacing="1" fill="#8A8275">coming</text>
  </g>
</svg>
