<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Learning trail from notes to basics to builds, each stage explained.">
  <defs>
    <pattern id="dots2" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#1C1B19" fill-opacity="0.05"/>
    </pattern>
    <marker id="arrTrail" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#539091"/>
    </marker>
  </defs>

  <rect width="1200" height="400" fill="#F4EEE2"/>
  <rect width="1200" height="400" fill="url(#dots2)"/>

  <rect x="24" y="24" width="1152" height="352" fill="none" stroke="#1C1B19" stroke-width="1"/>
  <rect x="32" y="32" width="1136" height="336" fill="none" stroke="#1C1B19" stroke-width="0.5" stroke-opacity="0.4"/>

  <text x="60" y="72" font-family="Courier New, monospace" font-size="11" letter-spacing="2" fill="#8A8275">THE · TRAIL</text>
  <text x="60" y="110" font-family="Georgia, serif" font-style="italic" font-size="26" fill="#1C1B19">From reading about Docker to shipping things that need it.</text>
  <line x1="60" y1="128" x2="1140" y2="128" stroke="#1C1B19" stroke-opacity="0.15"/>

  <!-- stage 1: notes -->
  <g>
    <rect x="80" y="170" width="330" height="170" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
    <rect x="80" y="170" width="5" height="170" fill="#539091" rx="2"/>
    <text x="104" y="196" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">STAGE 01</text>
    <text x="104" y="228" font-family="Georgia, serif" font-style="italic" font-size="26" fill="#1C1B19">Notes</text>
    <line x1="104" y1="244" x2="386" y2="244" stroke="#1C1B19" stroke-opacity="0.1"/>
    <text x="104" y="270" font-family="Courier New, monospace" font-size="12" fill="#3A372F">what Docker actually is,</text>
    <text x="104" y="288" font-family="Courier New, monospace" font-size="12" fill="#3A372F">in my own words</text>
    <text x="104" y="322" font-family="Courier New, monospace" font-size="10" letter-spacing="1" fill="#8A8275">docker-notes/</text>
  </g>

  <!-- arrow 1 -->
  <line x1="420" y1="255" x2="470" y2="255" stroke="#539091" stroke-width="1.8" marker-end="url(#arrTrail)"/>

  <!-- stage 2: basics -->
  <g>
    <rect x="480" y="170" width="330" height="170" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
    <rect x="480" y="170" width="5" height="170" fill="#539091" rx="2"/>
    <text x="504" y="196" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">STAGE 02</text>
    <text x="504" y="228" font-family="Georgia, serif" font-style="italic" font-size="26" fill="#1C1B19">Basics</text>
    <line x1="504" y1="244" x2="786" y2="244" stroke="#1C1B19" stroke-opacity="0.1"/>
    <text x="504" y="270" font-family="Courier New, monospace" font-size="12" fill="#3A372F">a Dockerfile, a compose,</text>
    <text x="504" y="288" font-family="Courier New, monospace" font-size="12" fill="#3A372F">Node + Postgres talking</text>
    <text x="504" y="322" font-family="Courier New, monospace" font-size="10" letter-spacing="1" fill="#8A8275">docker-basics/</text>
  </g>

  <!-- arrow 2 -->
  <line x1="820" y1="255" x2="870" y2="255" stroke="#539091" stroke-width="1.8" marker-end="url(#arrTrail)"/>

  <!-- stage 3: builds -->
  <g>
    <rect x="880" y="170" width="240" height="170" fill="#FFFFFF" stroke="#E0D8CA" stroke-width="1" rx="6"/>
    <rect x="880" y="170" width="5" height="170" fill="#539091" rx="2"/>
    <text x="904" y="196" font-family="Courier New, monospace" font-size="10" letter-spacing="2" fill="#8A8275">STAGE 03</text>
    <text x="904" y="228" font-family="Georgia, serif" font-style="italic" font-size="26" fill="#1C1B19">Builds</text>
    <line x1="904" y1="244" x2="1096" y2="244" stroke="#1C1B19" stroke-opacity="0.1"/>
    <text x="904" y="270" font-family="Courier New, monospace" font-size="12" fill="#3A372F">projects that would be</text>
    <text x="904" y="288" font-family="Courier New, monospace" font-size="12" fill="#3A372F">painful without containers</text>
    <text x="904" y="322" font-family="Courier New, monospace" font-size="10" letter-spacing="1" fill="#8A8275">one folder each</text>
  </g>
</svg>
